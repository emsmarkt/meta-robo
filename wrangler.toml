name = "meta-robo"
main = "worker.js"
compatibility_date = "2026-01-01"

# Roda a cada 5 minutos. APPLY_MODE="live" aplica de verdade; "dry" só calcula/loga.
[triggers]
crons = ["*/5 * * * *"]

# KV: guarda cooldown, log e "regra aplicada". Crie o namespace e cole o ID abaixo.
# (Storage & Databases -> KV -> Create -> nome RULES_KV -> copie o "Namespace ID")
[[kv_namespaces]]
binding = "RULES_KV"
id = "62fa6d5180d6403f81a5485e1e77d5ea"

# Variaveis (texto). Os SECRETS (META_TOKENS e RT_TOKEN) sao adicionados
# no painel do Cloudflare (Settings -> Variaveis e segredos), NUNCA no Git.
# ALERTAS TELEGRAM (opcional): crie os DOIS no painel do Cloudflare ->
#   TG_TOKEN = token do bot (do @BotFather) — adicione como SECRET.
#   TG_CHAT  = seu chat id (do @userinfobot) — pode ser var normal.
# Sem esses dois, os alertas ficam desligados (o resto do robo roda igual).
[vars]
APPLY_MODE = "dry"
RT_PTYPE = "1"
RT_ICTYPE = "2"

# ----- Parametros das REGRAS (edite aqui ou no painel do Cloudflare; tudo em texto) -----
R_DAYGOOD = "1.6"      # humor do dia: ROAS combinado >= isso = dia BOM
R_DAYOK = "1.2"        # entre R_DAYOK e R_DAYGOOD = NORMAL; abaixo = RUIM
R_MINSPEND = "100"     # (reservado)
R_FLOOR = "85"         # piso de orcamento diario (US$) — valor do CORTAR
R_CUTDAYS = "364"      # CORTAR empurra o termino p/ daqui X dias (limite FB e 365)
R_COOLDOWN = "15"      # minutos entre 2 aplicacoes na MESMA campanha (em teste: 15; era 60 fixo)
R_PAUSECPC = "4"       # PAUSAR: CPC (US$) acima disso...
R_PAUSESPEND = "60"    # ...E gasto acima disso, com 0 venda E 0 IC -> pausa a campanha (status PAUSED)
R_CPATARGET = "175"    # teto de CPA = META de ROAS (175 -> 1.5)
R_CPAROPE = "190"      # teto extra em dia BOM p/ quem ja vende (2+)
R_MINROAS = "1.3"      # abaixo disso -> CORTAR (+364 dias), independente do dia. 1.3-piso -> LIMITA
# Piso de ROAS p/ "ganhar" (so no ramo de ATE 5 vendas; acima = vencedora/nao reduz):
R_ACCBASE = "1.5"        # piso padrao (<=2 vendas, ou >2 vendas em dia nao-bom)
R_ACCGOOD = "1.35"       # piso em dia BOM com >2 vendas
R_ACCGOODMINSALES = "2"  # regra do piso BOM = sales > este valor (ou seja, >2 vendas)
R_AUMMAXSALES = "5"    # campanhas com MAIS de 5 vendas: so CORTA se ROAS < R_MINROAS; >=R_EXCROAS escala; no meio MANTEM (nunca LIMITA/AUMENTA)
R_CUTNOSALE = "90"     # gastou >= isso e 0 venda -> piso
R_EXCROAS = "2.0"      # excepcional: ROAS >= isso ...
R_EXCMINSALES = "3"    # ... com pelo menos N vendas -> escalar
R_SCALEMULT = "12"     # multiplicador de escala (12x o gasto de hoje; range util 10-15)
R_AUMROASLOW = "1.5"   # faixa ROAS bom: inicio
R_AUMROASHIGH = "1.9"  # faixa ROAS bom: fim
R_AUMPCTLOW = "0.30"   # +30% no ROAS 1.5
R_AUMPCTHIGH = "0.70"  # +70% no ROAS 1.9
R_SCALEUSEPCT = "0.2"  # so escala se gasto hoje >= isso do diario atual
R_RELEASE = "500"      # campanha que vende mas esta limitada -> libera p/ esse valor
R_ALERT3DROAS = "1.0"  # aviso "matar": ROAS dos 3 dias < isso
R_ALERT3DSPEND = "150" # so avisa se gastou >= isso nos 3 dias
R_FX = "5.1"           # cambio R$/US$ p/ converter o custo do RedTrack em dolar
